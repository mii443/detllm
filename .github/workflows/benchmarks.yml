name: benchmarks

on:
  workflow_dispatch:
    inputs:
      iters:
        description: "bench-testdata iterations"
        required: false
        default: "100"

jobs:
  bench-testdata:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: x86_64-linux
          - os: macos-14
            name: aarch64-macos
          - os: ubuntu-24.04-arm
            name: aarch64-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Run fixture benchmark
        shell: bash
        run: |
          set -eu
          case "${{ github.event.inputs.iters }}" in
            ''|*[!0-9]*)
              echo "iters must be a positive integer" >&2
              exit 2
              ;;
            0)
              echo "iters must be greater than zero" >&2
              exit 2
              ;;
          esac
          {
            printf 'benchmark-target=%s\n' '${{ matrix.name }}'
            printf 'runner-os=%s\n' "$RUNNER_OS"
            printf 'runner-arch=%s\n' "$RUNNER_ARCH"
            printf 'uname='
            uname -a
            printf 'rustc='
            rustc --version
            printf 'command=cargo run --release -p xtask -- bench-testdata --iters %s\n' '${{ github.event.inputs.iters }}'
            cargo run --release -p xtask -- bench-testdata --iters "${{ github.event.inputs.iters }}"
          } | tee bench-testdata-${{ matrix.name }}.txt
      - uses: actions/upload-artifact@v6
        with:
          name: bench-testdata-${{ matrix.name }}
          path: bench-testdata-${{ matrix.name }}.txt
